<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }

        .card {
            background: white;
            padding: 30px;
            width: 350px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .input-group {
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus {
            border-color: #4facfe;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            background: #4facfe;
            color: white;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #2f80ed;
        }

        .message {
            text-align: center;
            margin-top: 10px;
        }

        .error { color: red; }
        .success { color: green; }

        .footer {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
        }

        .footer a {
            color: #4facfe;
            text-decoration: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h2>Login</h2>

    <form id="loginForm">
        <div class="input-group">
            <input type="text" name="username" placeholder="Username or Email" required>
        </div>

        <div class="input-group">
            <input type="password" name="password" placeholder="Password" required>
        </div>

        <button type="submit">Login</button>
    </form>

    <p class="message" id="message"></p>

    <div class="footer">
        Don't have an account? <a href="#">Register</a>
    </div>
</div>

<script>
document.getElementById("loginForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const form = e.target;
    const formData = new FormData(form);
    const message = document.getElementById("message");

    message.innerHTML = "Logging in...";

    try {
        const response = await fetch("http://127.0.0.1:8000/Account/login/", {  // 🔁 change if needed
            method: "POST",
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            message.className = "message success";
            message.innerHTML = "✅ Login successful!";

            // 🔐 Save JWT token
            localStorage.setItem("access_token", data.access);
            localStorage.setItem("refresh_token", data.refresh);

            // 🚀 Redirect to dashboard
            setTimeout(() => {
                window.location.href = "todo.html";
            }, 1000);

        } else {
            message.className = "message error";
            message.innerHTML = data.detail || "Invalid credentials";
        }

    } catch (error) {
        message.className = "message error";
        message.innerHTML = "❌ Server error!";
    }
});
</script>

</body>
</html>
