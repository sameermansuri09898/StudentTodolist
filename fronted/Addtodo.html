<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Todo</title>
    <style>
        body {
            font-family: Arial;
            background: #f4f6f9;
        }
        .container {
            width: 450px;
            margin: 60px auto;
            background: #fff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        h2 {
            text-align: center;
        }
        input, textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background: #0056b3;
        }
        .message {
            text-align: center;
            margin-top: 10px;
        }
        .success { color: green; }
        .error { color: red; }
    </style>
</head>
<body>

<div class="container">
    <h2>Add Todo</h2>

    <form id="todoForm">
        <input type="text" name="title" placeholder="Title" required>
        <textarea name="description" placeholder="Description" rows="4" required></textarea>

        <button type="submit">Add Todo</button>
    </form>

    <p class="message" id="message"></p>
</div>

<script>
document.getElementById("todoForm").addEventListener("submit", async function(e) {
    e.preventDefault();

    const form = e.target;
    const formData = new FormData(form);

    const message = document.getElementById("message");
    message.innerHTML = "Saving...";

    // 🔐 If using JWT, store token in localStorage
    const token = localStorage.getItem("access_token");

    try {
        const response = await fetch("http://127.0.0.1:8000/Account/todolist/", {
            method: "POST",
            headers: {
                "Authorization": token ? `Bearer ${token}` : ""
            },
            body: formData
        });

        const data = await response.json();

        if (response.ok) {
            message.className = "message success";
            message.innerHTML = "✅ Todo added successfully!";
            form.reset();
        } else {
            message.className = "message error";
            message.innerHTML = JSON.stringify(data);
        }

    } catch (error) {
        message.className = "message error";
        message.innerHTML = "❌ Server error!";
    }
});
</script>

</body>
</html>
